<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Spanish Conversation Coach</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Setup screen ── */
    #setup-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 20px;
    }

    #setup-screen h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
    }

    #setup-screen p.subtitle {
      color: #9ca3af;
      text-align: center;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .key-card {
      background: #1a1a24;
      border: 1px solid #2d2d3d;
      border-radius: 16px;
      padding: 20px;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .key-card label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #a78bfa;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .key-card input {
      background: #0f0f18;
      border: 1px solid #3d3d55;
      border-radius: 10px;
      padding: 12px 14px;
      color: #e8e8f0;
      font-size: 0.9rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }

    .key-card input:focus { border-color: #a78bfa; }
    .key-card input::placeholder { color: #4a4a60; }

    .key-note {
      font-size: 0.78rem;
      color: #6b7280;
      line-height: 1.4;
    }

    .btn-start {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 16px 32px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      max-width: 420px;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-start:active { transform: scale(0.97); opacity: 0.9; }

    /* ── Main app ── */
    #app-screen {
      display: none;
      flex-direction: column;
      height: 100vh;
      max-width: 640px;
      margin: 0 auto;
      width: 100%;
    }

    header {
      padding: 14px 20px;
      border-bottom: 1px solid #1e1e2e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    header h2 {
      font-size: 1.1rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #btn-settings {
      background: none;
      border: 1px solid #2d2d3d;
      border-radius: 8px;
      color: #9ca3af;
      padding: 6px 10px;
      font-size: 0.78rem;
      cursor: pointer;
    }

    /* ── Conversation ── */
    #conversation {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      -webkit-overflow-scrolling: touch;
    }

    #conversation:empty::after {
      content: "Tap the mic and speak in Spanish to start!";
      color: #4a4a60;
      font-size: 0.95rem;
      text-align: center;
      padding-top: 40px;
      display: block;
    }

    .exchange {
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* User bubble */
    .bubble-user {
      align-self: flex-end;
      background: #1e2a4a;
      border: 1px solid #2d3f6a;
      border-radius: 18px 18px 4px 18px;
      padding: 12px 16px;
      max-width: 88%;
      font-size: 0.95rem;
      line-height: 1.5;
      color: #c7d7f7;
    }

    /* Correction card */
    .card-correction {
      background: #1a1a24;
      border: 1px solid #2d2d3d;
      border-left: 3px solid #a78bfa;
      border-radius: 4px 14px 14px 14px;
      padding: 12px 14px;
      max-width: 92%;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .correction-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #a78bfa;
    }

    .corrected-text {
      font-size: 0.95rem;
      color: #e8e8f0;
      line-height: 1.5;
    }

    .explanation-text {
      font-size: 0.82rem;
      color: #9ca3af;
      line-height: 1.4;
      border-top: 1px solid #2d2d3d;
      padding-top: 6px;
      margin-top: 2px;
    }

    .explanation-text.looks-good {
      color: #6ee7b7;
    }

    /* Claude reply */
    .card-reply {
      background: #111820;
      border: 1px solid #1e2a35;
      border-left: 3px solid #60a5fa;
      border-radius: 4px 14px 14px 14px;
      padding: 12px 14px;
      max-width: 92%;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .reply-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #60a5fa;
    }

    .reply-spanish {
      font-size: 0.98rem;
      color: #e8e8f0;
      line-height: 1.55;
    }

    .reply-english {
      font-size: 0.82rem;
      color: #6b7280;
      line-height: 1.4;
      font-style: italic;
    }

    /* ── Bottom bar ── */
    #bottom-bar {
      flex-shrink: 0;
      padding: 16px 20px 28px;
      border-top: 1px solid #1e1e2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #status-text {
      font-size: 0.82rem;
      color: #6b7280;
      min-height: 18px;
      text-align: center;
    }

    #status-text.recording { color: #f87171; }
    #status-text.processing { color: #fbbf24; }
    #status-text.error { color: #f87171; }

    #mic-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.35);
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }

    #mic-btn:active { transform: scale(0.93); }

    #mic-btn.recording {
      background: linear-gradient(135deg, #dc2626, #9f1239);
      box-shadow: 0 4px 24px rgba(220, 38, 38, 0.5);
      animation: pulse 1.2s ease-in-out infinite;
    }

    #mic-btn.processing {
      background: linear-gradient(135deg, #d97706, #92400e);
      box-shadow: 0 4px 24px rgba(217, 119, 6, 0.4);
      pointer-events: none;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 4px 24px rgba(220, 38, 38, 0.5); }
      50%       { box-shadow: 0 4px 36px rgba(220, 38, 38, 0.8); }
    }

    .mic-icon { width: 28px; height: 28px; }

    .spinner {
      width: 26px; height: 26px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Text input fallback */
    #text-row {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    #text-input {
      flex: 1;
      background: #1a1a24;
      border: 1px solid #2d2d3d;
      border-radius: 10px;
      padding: 10px 14px;
      color: #e8e8f0;
      font-size: 0.9rem;
      outline: none;
    }

    #text-input:focus { border-color: #a78bfa; }

    #btn-send {
      background: #3730a3;
      border: none;
      border-radius: 10px;
      color: white;
      padding: 10px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }

    .toggle-text {
      font-size: 0.75rem;
      color: #4a4a60;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    #btn-audio {
      background: none;
      border: 1px solid #2d2d3d;
      border-radius: 8px;
      color: #6b7280;
      padding: 6px 10px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    #btn-audio.on {
      border-color: #60a5fa;
      color: #60a5fa;
    }

    .btn-replay {
      background: none;
      border: none;
      color: #3b5a7a;
      font-size: 0.85rem;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s;
      line-height: 1;
    }

    .btn-replay:active { color: #60a5fa; }

    .word-tap {
      border-bottom: 1px dotted #3b5a7a;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.15s;
    }
    .word-tap:active { background: rgba(96,165,250,0.15); }

    #word-popup {
      position: fixed;
      background: #1e2535;
      border: 1px solid #3b5a7a;
      border-radius: 12px;
      padding: 12px 16px;
      max-width: 260px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      z-index: 999;
      display: none;
      flex-direction: column;
      gap: 4px;
    }

    #word-popup .pop-word {
      font-size: 1rem;
      font-weight: 700;
      color: #60a5fa;
    }

    #word-popup .pop-pos {
      font-size: 0.75rem;
      color: #a78bfa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #word-popup .pop-def {
      font-size: 0.88rem;
      color: #e8e8f0;
      line-height: 1.45;
      margin-top: 2px;
    }

    #word-popup .pop-spinner {
      font-size: 0.85rem;
      color: #6b7280;
    }
  </style>
</head>
<body>

<!-- ── Setup Screen ── -->
<div id="setup-screen">
  <h1>🇪🇸 Spanish Coach</h1>
  <p class="subtitle">Enter your API keys to get started.<br>Keys are stored only in this browser tab.</p>

  <div class="key-card">
    <label>Anthropic API Key</label>
    <input type="password" id="key-anthropic" placeholder="sk-ant-..." autocomplete="off">

    <label>OpenAI API Key</label>
    <input type="password" id="key-openai" placeholder="sk-..." autocomplete="off">

    <p class="key-note">
      Keys are saved in your browser's local storage and go directly to Anthropic and OpenAI.
      Never sent to any other server.
    </p>
  </div>

  <button class="btn-start" onclick="startApp()">Start Practicing</button>
</div>

<!-- ── Main App ── -->
<div id="app-screen">
  <header>
    <h2>🇪🇸 Spanish Coach</h2>
    <div style="display:flex;gap:8px;">
      <button id="btn-audio" onclick="toggleAudio()">🔇 Audio</button>
      <button id="btn-settings" onclick="showSettings()">⚙ Keys</button>
    </div>
  </header>

  <div id="conversation"></div>

  <div id="bottom-bar">
    <div id="status-text">Tap the mic and speak</div>

    <button id="mic-btn" onclick="toggleRecording()">
      <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>

    <span class="toggle-text" onclick="toggleTextInput()">or type instead</span>

    <div id="text-row" style="display:none;">
      <input type="text" id="text-input" placeholder="Type Spanish or ask a question…" onkeydown="if(event.key==='Enter') sendText()">
      <button id="btn-send" onclick="sendText()">Send</button>
    </div>
  </div>
</div>

<div id="word-popup"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let anthropicKey = '';
let openaiKey    = '';
let mediaRecorder = null;
let audioChunks   = [];
let isRecording   = false;
let isProcessing  = false;
// audioMode: 'off' | 'reply' | 'full'
let audioMode    = localStorage.getItem('sp_coach_audio') || 'reply';
let currentAudio = null;

// Conversation history for Claude (system excluded — passed separately)
let history = [];

const SYSTEM_PROMPT = `You are a warm, encouraging Spanish conversation coach. Your job is to:
1. Correct the user's Spanish naturally (not harshly)
2. Continue the conversation in natural Spanish

ALWAYS respond with valid JSON — no markdown, no code blocks, just raw JSON — using exactly these keys:
{
  "corrected": "corrected version of what the user said (use original if already correct)",
  "explanation": "one short English sentence explaining the main correction, or 'Looks good!' if correct",
  "reply": "your natural Spanish reply to continue the conversation",
  "reply_translation": "English translation of your reply",
  "spoken_response": "a single natural spoken Spanish response (2-3 sentences) that: (1) gently mentions the main correction in Spanish if there was one, then (2) continues the conversation naturally — written as if you are speaking aloud, not reading a lesson"
}

If the user asks a question (in English or Spanish), answer it in Spanish with an English translation.
Keep replies conversational and appropriately brief — 1-3 sentences.
For spoken_response: if the input was already correct, skip the correction and just respond naturally.

CRITICAL: Always use Latin American Spanish exclusively. NEVER use Spain Spanish forms.
- Always use "ustedes" for the plural you — NEVER "vosotros/vosotras"
- Always use "tú" for informal singular (never "vos" unless the user initiates it)
- Use vocabulary common across Latin America, not Spain-specific terms`;

// ── Setup ──────────────────────────────────────────────────────────────────
function startApp() {
  const ak = document.getElementById('key-anthropic').value.trim();
  const ok = document.getElementById('key-openai').value.trim();

  if (!ak || !ok) {
    alert('Please enter both API keys.');
    return;
  }
  if (!ak.startsWith('sk-ant')) {
    alert('Anthropic key should start with sk-ant-');
    return;
  }
  if (!ok.startsWith('sk-')) {
    alert('OpenAI key should start with sk-');
    return;
  }

  anthropicKey = ak;
  openaiKey    = ok;

  localStorage.setItem('sp_coach_ak', ak);
  localStorage.setItem('sp_coach_ok', ok);

  document.getElementById('setup-screen').style.display = 'none';
  const app = document.getElementById('app-screen');
  app.style.display = 'flex';
}

function loadSavedKeys() {
  const ak = localStorage.getItem('sp_coach_ak');
  const ok = localStorage.getItem('sp_coach_ok');
  if (ak && ok) {
    anthropicKey = ak;
    openaiKey    = ok;
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
  }
}

loadSavedKeys();
updateAudioBtn();

function showSettings() {
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
  document.getElementById('key-anthropic').value = anthropicKey;
  document.getElementById('key-openai').value    = openaiKey;
}

function toggleTextInput() {
  const row = document.getElementById('text-row');
  row.style.display = row.style.display === 'none' ? 'flex' : 'none';
}

// ── Recording ─────────────────────────────────────────────────────────────
async function toggleRecording() {
  if (isProcessing) return;

  if (!isRecording) {
    await startRecording();
  } else {
    stopRecording();
  }
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];

    // Prefer webm/opus; Safari falls back to mp4
    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus'
      : MediaRecorder.isTypeSupported('audio/mp4')
        ? 'audio/mp4'
        : '';

    mediaRecorder = mimeType
      ? new MediaRecorder(stream, { mimeType })
      : new MediaRecorder(stream);

    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      processAudio();
    };

    mediaRecorder.start();
    isRecording = true;

    const btn = document.getElementById('mic-btn');
    btn.classList.add('recording');
    btn.innerHTML = `<svg class="mic-icon" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>`;
    setStatus('Recording… tap to stop', 'recording');
  } catch (err) {
    setStatus('Mic access denied — use text input', 'error');
    document.getElementById('text-row').style.display = 'flex';
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  isRecording  = false;
  isProcessing = true;

  const btn = document.getElementById('mic-btn');
  btn.classList.remove('recording');
  btn.classList.add('processing');
  btn.innerHTML = `<div class="spinner"></div>`;
  setStatus('Transcribing…', 'processing');
}

// ── Audio → Text (Whisper) ─────────────────────────────────────────────────
async function processAudio() {
  try {
    const mimeType = audioChunks[0]?.type || 'audio/webm';
    const ext      = mimeType.includes('mp4') ? 'mp4' : mimeType.includes('wav') ? 'wav' : 'webm';
    const blob     = new Blob(audioChunks, { type: mimeType });

    const formData = new FormData();
    formData.append('file', blob, `audio.${ext}`);
    formData.append('model', 'whisper-1');
    formData.append('language', 'es');  // hint Spanish but Whisper handles English too

    const res = await fetch('https://api.openai.com/v1/audio/transcriptions', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${openaiKey}` },
      body: formData
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `Whisper error ${res.status}`);
    }

    const data = await res.json();
    const transcript = data.text?.trim();

    if (!transcript) {
      setStatus('No speech detected — try again', 'error');
      resetMicBtn();
      return;
    }

    setStatus('Getting feedback…', 'processing');
    await getCoachResponse(transcript);

  } catch (err) {
    setStatus(`Error: ${err.message}`, 'error');
    resetMicBtn();
  }
}

// ── Text input path ────────────────────────────────────────────────────────
async function sendText() {
  const input = document.getElementById('text-input');
  const text  = input.value.trim();
  if (!text || isProcessing) return;
  input.value = '';
  isProcessing = true;
  setStatus('Getting feedback…', 'processing');
  await getCoachResponse(text);
}

// ── Claude API (streaming) ─────────────────────────────────────────────────
async function getCoachResponse(userText) {
  try {
    history.push({ role: 'user', content: userText });

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': anthropicKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 512,
        stream: true,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `Claude error ${res.status}`);
    }

    const exchangeDiv = createStreamingCard(userText);
    setStatus('', '');

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let accumulated = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const lines = decoder.decode(value, { stream: true }).split('\n');
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (!data || data === '[DONE]') continue;
        try {
          const evt = JSON.parse(data);
          if (evt.type === 'content_block_delta' && evt.delta?.type === 'text_delta') {
            accumulated += evt.delta.text;
            updateStreamingReply(exchangeDiv, accumulated);
          }
        } catch {}
      }
    }

    const jsonStr = accumulated.replace(/```json?\s*/gi, '').replace(/```/g, '').trim();
    let parsed;
    try { parsed = JSON.parse(jsonStr); }
    catch { throw new Error('Claude returned non-JSON response'); }

    history.push({ role: 'assistant', content: parsed.reply });
    finalizeExchange(exchangeDiv, userText, parsed);

    if (audioMode === 'reply') {
      await speakReply(parsed.reply);
    } else if (audioMode === 'full') {
      await speakReply(parsed.spoken_response || parsed.reply);
    }
    setStatus('Tap the mic and speak', '');
  } catch (err) {
    history.pop();
    setStatus(`Error: ${err.message}`, 'error');
  } finally {
    isProcessing = false;
    resetMicBtn();
  }
}

// ── Render ─────────────────────────────────────────────────────────────────
function createStreamingCard(original) {
  const conv = document.getElementById('conversation');
  const div  = document.createElement('div');
  div.className = 'exchange';
  div.innerHTML = `
    <div class="bubble-user">${escHtml(original)}</div>
    <div class="card-reply">
      <span class="reply-label">Coach says</span>
      <div class="reply-spanish streaming-text" style="color:#4a5568;font-style:italic;">…</div>
    </div>`;
  conv.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
  return div;
}

function updateStreamingReply(div, accumulated) {
  const match = accumulated.match(/"reply"\s*:\s*"((?:[^"\\]|\\.)*)"/);
  if (!match) return;
  const text = match[1].replace(/\\n/g, '\n').replace(/\\"/g, '"').replace(/\\t/g, '\t');
  const el = div.querySelector('.streaming-text');
  if (el) { el.textContent = text; el.style.color = ''; el.style.fontStyle = ''; }
}

function finalizeExchange(div, original, parsed) {
  const looksGood = parsed.explanation?.toLowerCase().includes('looks good');
  div.innerHTML = `
    <div class="bubble-user">${escHtml(original)}</div>
    <div class="card-correction">
      <span class="correction-label">Correction</span>
      <div class="corrected-text">${escHtml(parsed.corrected)}</div>
      <div class="explanation-text${looksGood ? ' looks-good' : ''}">${escHtml(parsed.explanation)}</div>
    </div>
    <div class="card-reply">
      <span class="reply-label" style="display:flex;align-items:center;justify-content:space-between;">
        Coach says
        <button class="btn-replay tappable" data-reply="${escAttr(parsed.reply)}" title="Replay">▶ replay</button>
      </span>
      <div class="reply-spanish">${wrapWords(parsed.reply)}</div>
      <div class="reply-english">${escHtml(parsed.reply_translation)}</div>
    </div>`;
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

// ── TTS ───────────────────────────────────────────────────────────────────
async function speakReply(text) {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
    return;
  }
  try {
    const res = await fetch('https://api.openai.com/v1/audio/speech', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${openaiKey}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ model: 'tts-1', voice: 'nova', input: text })
    });
    if (!res.ok) return;
    const blob  = await res.blob();
    const url   = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentAudio = audio;
    audio.onended = () => { URL.revokeObjectURL(url); currentAudio = null; };
    await audio.play();
  } catch {
    currentAudio = null;
  }
}

function toggleAudio() {
  const cycle = { 'off': 'reply', 'reply': 'full', 'full': 'off' };
  audioMode = cycle[audioMode] || 'reply';
  localStorage.setItem('sp_coach_audio', audioMode);
  updateAudioBtn();
}

function updateAudioBtn() {
  const btn = document.getElementById('btn-audio');
  if (!btn) return;
  const labels = { off: '🔇 Off', reply: '🔊 Reply', full: '🎧 Full' };
  btn.textContent = labels[audioMode] || '🔊 Reply';
  btn.classList.toggle('on', audioMode !== 'off');
}

// ── Helpers ────────────────────────────────────────────────────────────────
function setStatus(msg, cls) {
  const el = document.getElementById('status-text');
  el.textContent = msg;
  el.className   = cls ? `status-text ${cls}` : 'status-text';
  el.id          = 'status-text';  // keep id stable
  el.setAttribute('class', cls || '');
}

function resetMicBtn() {
  const btn = document.getElementById('mic-btn');
  btn.classList.remove('recording', 'processing');
  btn.innerHTML = `
    <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>`;
}

function escHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function escAttr(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
}

document.getElementById('conversation').addEventListener('click', e => {
  const el = e.target.closest('.tappable');
  if (el && el.dataset.reply) speakReply(el.dataset.reply);
});

// ── Word lookup ────────────────────────────────────────────────────────────
function wrapWords(text) {
  return text.split(/(\s+)/).map(token => {
    if (/^\s+$/.test(token)) return token;
    const clean = token.replace(/^[¿¡"'(]+|[.,!?;:"')]+$/g, '');
    if (!clean) return escHtml(token);
    const pre  = token.slice(0, token.indexOf(clean));
    const post = token.slice(token.indexOf(clean) + clean.length);
    return `${escHtml(pre)}<span class="word-tap" data-word="${escAttr(clean)}">${escHtml(clean)}</span>${escHtml(post)}`;
  }).join('');
}


document.getElementById('conversation').addEventListener('click', e => {
  const word = e.target.closest('.word-tap');
  if (word) showWordPopup(word.dataset.word, word);
});

document.addEventListener('touchstart', e => {
  if (!e.target.closest('#word-popup')) hideWordPopup();
}, { passive: true });

function showWordPopup(word, anchorEl) {
  const popup = document.getElementById('word-popup');
  popup.style.display = 'flex';
  popup.innerHTML = `<span class="pop-word">${escHtml(word)}</span><span class="pop-spinner">Looking up…</span>`;

  const rect = anchorEl.getBoundingClientRect();
  let top  = rect.bottom + 8;
  let left = Math.max(8, Math.min(rect.left, window.innerWidth - 276));
  if (top + 120 > window.innerHeight) top = rect.top - 128;
  popup.style.top  = `${top}px`;
  popup.style.left = `${left}px`;

  lookupWord(word);
}

function hideWordPopup() {
  document.getElementById('word-popup').style.display = 'none';
}

async function lookupWord(word) {
  const popup = document.getElementById('word-popup');
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': anthropicKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 80,
        system: 'You are a Spanish dictionary. Respond with raw JSON only, no markdown: {"pos":"part of speech in English","def":"brief English definition, 1 short sentence"}',
        messages: [{ role: 'user', content: `Define the Latin American Spanish word: ${word}` }]
      })
    });
    if (!res.ok) throw new Error();
    const data = await res.json();
    const raw  = data.content?.[0]?.text?.replace(/```json?\s*/gi,'').replace(/```/g,'').trim();
    const parsed = JSON.parse(raw);
    if (popup.style.display !== 'none') {
      popup.innerHTML = `
        <span class="pop-word">${escHtml(word)}</span>
        <span class="pop-pos">${escHtml(parsed.pos)}</span>
        <span class="pop-def">${escHtml(parsed.def)}</span>`;
    }
  } catch {
    if (popup.style.display !== 'none') {
      popup.innerHTML = `<span class="pop-word">${escHtml(word)}</span><span class="pop-spinner">Couldn't load definition</span>`;
    }
  }
}
